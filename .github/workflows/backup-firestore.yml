# Firestore 自動バックアップ
# =============================================
# - 毎週日曜 03:00 JST (= 土曜 18:00 UTC) に全コレクションを JSON.gz でエクスポート
# - GitHub Artifact に保管 (90日自動保持)
# - 失敗時は GitHub 通知 (Settings → Notifications → Actions)
#
# ⚠️ セットアップ手順:
# 1. Firebase Console → プロジェクトの設定 → サービスアカウント
#    → 「新しい秘密鍵の生成」でJSONをダウンロード
# 2. GitHub リポジトリ → Settings → Secrets and variables → Actions
#    → 「New repository secret」で
#      Name : FIREBASE_SERVICE_ACCOUNT
#      Value: ダウンロードしたJSONの中身をそのまま貼り付け
# 3. Actions タブで手動実行 (workflow_dispatch) して動作確認
#
# 復元方法 (将来使う時):
# 1. Actions → Backup Firestore → 該当 run の Artifacts から zip ダウンロード
# 2. 展開 → backup-*.json.gz を gunzip で解凍
# 3. firebase-admin スクリプトで各コレクションにドキュメントを書き戻す

name: Backup Firestore

on:
  schedule:
    # 土曜 18:00 UTC = 日曜 03:00 JST (週次)
    - cron: '0 18 * * 6'
  workflow_dispatch: # 手動実行も可

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install firebase-admin
        run: npm install firebase-admin

      - name: Run Firestore backup
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/backup-firestore.js

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: firestore-backup-${{ github.run_number }}-${{ github.run_id }}
          path: backups/*.json.gz
          retention-days: 90
          if-no-files-found: error
